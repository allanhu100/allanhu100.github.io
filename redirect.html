<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  try {
    // Fetch redirects JSON
    const response = await fetch('/redirects.json');
    if (!response.ok) throw new Error('Redirects file not found');
    const redirects = await response.json();

    // Redirect if ID exists
    if (id && redirects[id]) {
      window.location.href = redirects[id];
    } else {
      window.location.href = 'https://allanhu100.github.io/404';
    }
  } catch (e) {
    console.error(e);
    window.location.href = 'https://allanhu100.github.io/404';
  }
})();
</script>
</head>
<body>
Redirecting...
</body>
</html>
