<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>
<script>
(() => {
  const params = new URLSearchParams(window.location.search);
  const idParam = params.get('id');

  if (idParam) {
    // Forward to the new canonical r?id= URL
    window.location.href = `/r?id=${encodeURIComponent(idParam)}`;
  } else {
    document.body.textContent = "No id provided for redirect ❌";
  }
})();
</script>
</head>
<body>
Redirecting…

⚠️ redirect.html is deprecated and will redirect traffic to r.html
</body>
</html>
