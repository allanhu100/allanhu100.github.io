<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>

<style>
  body {
    font-family: sans-serif;
    text-align: center;
    padding: 2rem;
    background: #f9f9f9;
    color: #333;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
  }

  .message {
    font-size: 2rem;
    font-weight: bold;
    text-align: center;
  }

  #previewBox {
    display: inline-block;
    background: #e0e0e0;
    padding: 1.5rem;
    border-radius: 8px;
    max-width: 90%;
    word-wrap: break-word;
    margin-top: 2rem;
    font-size: 1.2rem;
  }

  #buttons {
    margin-top: 1.5rem;
  }

  button {
    padding: 0.6rem 1rem;
    margin: 0 0.5rem;
    font-size: 1rem;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  #redirectNow {
    background: #4caf50;
    color: white;
  }

  #cancelRedirect {
    background: #f44336;
    color: white;
  }

  #timer {
    margin-top: 1rem;
    font-size: 1rem;
  }
</style>

<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  const idParam = params.get('id');

  if (!idParam) {
    document.body.innerHTML = `<div class="message">No id provided for redirect ❌</div>`;
    return;
  }

  const sheetCSVUrl = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQqTIz74rTp4UAPrND29ZzRMoDgQS2HLB7FKU5m1IF0AhvvxPgn7ocyUXy9DMiGVb1_DKiePMGIVNTc/pub?gid=463148270&single=true&output=csv&t=${Date.now()}`;

  function isValidUrl(str) {
    try { new URL(str); return true; } 
    catch { return false; }
  }

  try {
    const res = await fetch(sheetCSVUrl);
    if (!res.ok) throw new Error('Could not fetch redirects sheet');
    const csvText = await res.text();

    const lines = csvText.trim().split('\n');
    lines.shift(); // skip header

    const redirects = {};
    lines.forEach(line => {
      const row = line.split(',');
      const redirect = {
        id: row[1]?.trim(),
        url: row[2]?.trim(),
        expiry: row[3]?.trim(),
        displayPreview: (row[4]?.trim().toUpperCase() === "TRUE")
      };
      if (redirect.id && redirect.url) redirects[redirect.id] = redirect;
    });

    let redirectObj = redirects[idParam];
    let urlToUse;

    // Determine redirect URL
    if (redirectObj && (!redirectObj.expiry || new Date() < new Date(redirectObj.expiry))) {
      urlToUse = redirectObj.url;
    } else if (isValidUrl(idParam)) {
      urlToUse = idParam.startsWith('http') ? idParam : `https://${idParam}`;
      redirectObj = { displayPreview: true, isCSV: false }; // mark as arbitrary URL
    } else {
      document.body.innerHTML = `<div class="message">Link expired or ID not found ❌</div>`;
      return;
    }

    if (redirectObj.displayPreview) {
      const urlObj = new URL(urlToUse);
      const previewBox = document.createElement('div');
      previewBox.id = 'previewBox';

      // Base content
      previewBox.innerHTML = `
        ⚠️ Go at your own risk!<br><br>
        <strong>URL:</strong> <a href="${urlObj.href}" target="_blank">${urlObj.href}</a><br>
        <strong>Protocol:</strong> ${urlObj.protocol}<br>
        <strong>Hostname:</strong> ${urlObj.hostname}<br>
        <strong>Path:</strong> ${urlObj.pathname}<br>
        <strong>Port:</strong> ${urlObj.port || 'default'}<br>
        <div id="buttons">
          <button id="redirectNow">Redirect Now</button>
          <button id="cancelRedirect">Cancel Redirect</button>
        </div>
      `;

      // Add timer only if CSV ID
      if (redirectObj.isCSV !== false) {
        previewBox.innerHTML += `<p id="timer">Redirecting in 10 seconds...</p>`;
      }

      document.body.innerHTML = "";
      document.body.appendChild(previewBox);

      document.getElementById('redirectNow').onclick = () => {
        window.location.href = urlObj.href;
      };

      document.getElementById('cancelRedirect').onclick = () => {
        window.location.href = 'https://allanhu100.github.io';
      };

      // Countdown for CSV IDs only
      if (redirectObj.isCSV !== false) {
        let countdown = 10;
        const timerEl = document.getElementById('timer');
        const interval = setInterval(() => {
          countdown--;
          if (countdown > 0) {
            timerEl.textContent = `Redirecting in ${countdown} seconds...`;
          } else {
            clearInterval(interval);
            window.location.href = urlObj.href;
          }
        }, 1000);
      }

    } else {
      window.location.href = urlToUse;
    }

  } catch (e) {
    console.error('Redirect failed:', e);
    document.body.innerHTML = `<div class="message">Redirect failed ❌</div>`;
  }
})();
</script>

</head>
<body>
  <div class="message">Redirecting, please wait...</div>
</body>
</html>
