<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚠️ Testing Playground ⚠️</title>
<style>
    body {
        text-align: center;
        font-family: Arial, sans-serif;
        margin: 50px;
        background-color: #f5f5f5;
    }
    header {
        font-size: 2em;
        font-weight: bold;
        margin-bottom: 30px;
    }
    img {
        max-width: 100%;
        height: auto;
    }

    /* Tooltip / Banner styles */
    .plate-tooltip-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1000;
    }

    .tooltip-trigger {
        display: inline-block;
        width: 50px;
        height: 50px;
        background-color: #facc15;
        border-radius: 50%;
        position: relative;
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        transition: transform 0.2s;
    }

    .tooltip-trigger:hover {
        transform: scale(1.1);
    }

    .tooltip-trigger::after {
        content: attr(data-tooltip);
        position: absolute;
        bottom: 60px;
        right: 50%;
        transform: translateX(50%);
        background-color: #fff8c5;
        color: #78350f;
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 13px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .tooltip-trigger:hover::after {
        opacity: 1;
    }

    .tooltip-trigger .warning-symbol {
        width: 100%;
        height: 100%;
        clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
        background-color: #f59e0b;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: #fff;
        font-size: 20px;
    }
</style>
</head>
<body>
<header>Dinosaur 🦖</header>
<p>Rawr</p>
<img src="https://github.com/user-attachments/assets/a84ef3ad-5890-4d51-98a5-f3c5c329608d" alt="Dinosaur">

<!-- Tooltip Banner by pharmacist-sabot -->
<div class="plate-tooltip-container">
    <a href="https://allanhu100.github.io/home" class="tooltip-trigger" data-tooltip="Warning: Page Functionality May Vary">
        <div class="warning-symbol">!</div>
    </a>
</div>

</body>
</html>
